<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hosting Arena</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>

<body>
<div class="menu-container">
    <h2>Starting Arena...</h2>
    <p id="join-code" style="margin-top:20px;">Join Code: <span id="code-display">---</span></p>
</div>

<script>
function generateJoinCode(length = 6) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let code = '';
    for (let i = 0; i < length; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return code;
}

const codeDisplay = document.getElementById('code-display');

startHosting();

function startHosting() {

    const joinCode = generateJoinCode();
    codeDisplay.textContent = joinCode;

    // ACTUAL server peer
    const hostPeer = new Peer(joinCode, {
        host: '0.peerjs.com',
        port: 443,
        path: '/'
    });

    // store clients
    const clients = [];
    const playerNames = [];

    hostPeer.on('open', id => {
        // open the game tab after host exists
        window.open(`server.html?code=${joinCode}`, '_blank');
    });

    hostPeer.on('connection', conn => {

        function broadcastPlayerList() {
            clients.forEach(c => {
                if(c.open) {
                    c.send({
                        type: "updateList",
                        players: playerNames
                    });
                }
            });
        }

        function removeClient() {
            const i = clients.indexOf(conn);
            if(i !== -1){
                clients.splice(i, 1);
                playerNames.splice(i, 1);
                broadcastPlayerList();
            }
        }

        conn.on('data', data => {
            if(data.type === "join"){
                clients.push(conn);
                playerNames.push(data.name);
                broadcastPlayerList();
            }
        });

        // handle disconnects
        conn.on('close', removeClient);
        conn.on('error', removeClient);

    });

    // extremely rare but handle duplicate code
    hostPeer.on('error', err => {
        if(err.type === 'unavailable-id'){
            startHosting(); // regenerate a new code automatically
        } else {
            console.error("Host Peer Error:", err);
        }
    });

}
</script>

</body>
</html>

<div id="server-container">
    <h2>Connecting to Arena...</h2>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const joinCode = urlParams.get('code') || '';
const serverContainer = document.getElementById('server-container');

if (!joinCode) {
    serverContainer.innerHTML = '<h1>Arena not found</h1>';
} else {
    const peer = new Peer();
    let serverExists = false;

    const conn = peer.connect(joinCode);

    // If connection opens, server exists
    conn.on('open', () => {
        serverExists = true;

        serverContainer.innerHTML = `
            <h2>Server Running</h2>
            <div id="player-list-container">
                <ul id="player-list"></ul>
            </div>
        `;

        const playerListEl = document.getElementById('player-list');
        const playerNames = [];
        function updatePlayerList() {
            playerListEl.innerHTML = playerNames.map(name => `<li>${name}</li>`).join('');
        }

        // send name to server
        const displayName = localStorage.getItem("kb_display_name") || "Guest";
        conn.send({ type: "join", name: displayName });

        conn.on('data', data => {
            if (data.type === "updateList") {
                playerNames.length = 0;
                playerNames.push(...data.players);
                updatePlayerList();
            }
        });
    });

    conn.on('close', () => {
        if (!serverExists) showNotFound();
    });
    conn.on('error', () => {
        if (!serverExists) showNotFound();
    });

    // Safe timeout for slow connections
    setTimeout(() => {
        if (!serverExists) showNotFound();
    }, 5000); // 5 seconds

    function showNotFound() {
        serverContainer.innerHTML = '<h1>Arena not found</h1>';
    }
</script>

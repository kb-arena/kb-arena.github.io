<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Lobby</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>

<style>
#server-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    text-align:center;
}
#server-container h1{
    color:red;
    font-size:48px;
}
</style>
</head>

<body>

<div id="server-container">
    <h2>Connecting to Arena...</h2>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const joinCode = urlParams.get('code');
const serverContainer = document.getElementById('server-container');

if(!joinCode){
    serverContainer.innerHTML = "<h1>Arena not found</h1>";
    throw new Error("No code");
}

// create a temporary peer to CHECK if host exists
const testPeer = new Peer(joinCode, {
    host:'0.peerjs.com',
    port:443,
    path:'/'
});

testPeer.on('open', ()=>{
    // we successfully created the ID -> no host owns it
    serverContainer.innerHTML = "<h1>Arena not found</h1>";
    testPeer.destroy();
});

testPeer.on('error', err=>{
    // unavailable-id means the host already owns it
    if(err.type === 'unavailable-id'){
        connectToHost();
    }else{
        serverContainer.innerHTML = "<h1>Arena not found</h1>";
    }
});

function connectToHost(){

    const clientPeer = new Peer();

    clientPeer.on('open', ()=>{

        const conn = clientPeer.connect(joinCode);

        conn.on('open', ()=>{

            // load lobby UI
            serverContainer.innerHTML = `
                <h2>Arena Lobby</h2>
                <div id="player-list-container">
                    <ul id="player-list"></ul>
                </div>
            `;

            const playerListEl = document.getElementById("player-list");
            const displayName = localStorage.getItem("kb_display_name") || "Guest";

            // tell server we joined
            conn.send({type:"join", name:displayName});

            // receive player updates
            conn.on('data', data=>{
                if(data.type==="updateList"){
                    playerListEl.innerHTML =
                        data.players.map(p=>`<li>${p}</li>`).join('');
                }
            });

            conn.on('close', ()=>{
                serverContainer.innerHTML="<h1>Arena closed</h1>";
            });

        });

        conn.on('error', ()=>{
            serverContainer.innerHTML="<h1>Arena not found</h1>";
        });

    });
}
</script>

</body>
</html>

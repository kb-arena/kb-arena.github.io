<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena</title>
<link rel="stylesheet" href="style.css">

<!-- PeerJS MUST load before our script -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>

<style>
#server-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    text-align:center;
}
#server-container h1{
    color:red;
    font-size:48px;
}
</style>
</head>

<body>

<div id="server-container">
    <h2>Connecting to Arena...</h2>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const joinCode = urlParams.get('code') || '';
const serverContainer = document.getElementById('server-container');

if (!joinCode) {
    serverContainer.innerHTML = '<h1>Arena not found</h1>';
} else {

    // Attempt to create peer with same ID as server
    const testPeer = new Peer(joinCode, {
        host: '0.peerjs.com',
        port: 443,
        path: '/'
    });

    // If this succeeds -> nobody owns the code -> no arena exists
    testPeer.on('open', id => {
        serverContainer.innerHTML = '<h1>Arena not found</h1>';
        testPeer.destroy();
    });

    // If this errors with unavailable-id -> server IS running
    testPeer.on('error', err => {

        if (err.type === 'unavailable-id') {
            startClient();
        } else {
            serverContainer.innerHTML = '<h1>Arena not found</h1>';
        }

    });

    function startClient(){

        const clientPeer = new Peer();

        clientPeer.on('open', () => {

            const conn = clientPeer.connect(joinCode);

            conn.on('open', () => {

                // Load normal lobby UI
                serverContainer.innerHTML = `
                    <h2>Server Running</h2>
                    <div id="player-list-container">
                        <ul id="player-list"></ul>
                    </div>
                `;

                const playerListEl = document.getElementById('player-list');

                const displayName =
                    localStorage.getItem("kb_display_name") || "Guest";

                // tell server we joined
                conn.send({ type:"join", name:displayName });

                // receive player list updates
                conn.on('data', data => {
                    if(data.type === "updateList"){
                        playerListEl.innerHTML =
                            data.players.map(n=>`<li>${n}</li>`).join('');
                    }
                });

                conn.on('close', () => {
                    serverContainer.innerHTML = '<h1>Arena closed</h1>';
                });

            });

            conn.on('error', () => {
                serverContainer.innerHTML = '<h1>Arena not found</h1>';
            });

        });
    }
}
</script>

</body>
</html>
